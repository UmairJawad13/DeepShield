<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeepShield Extension</title>
  <style>
    :root {
      --primary: #00f0ff;
      --bg: #050510;
      --surface: #101020;
      --border: rgba(0, 240, 255, 0.2);
    }
    body {
      width: 320px;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .header h1 span {
      color: var(--primary);
    }
    .container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    button {
      background: transparent;
      color: #fff;
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    button:hover {
      background: var(--surface);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-family: monospace;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .loader {
      display: none;
      width: 100%;
      height: 2px;
      background: var(--primary);
      margin-top: 10px;
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { transform: scaleX(0); transform-origin: left; }
      50% { transform: scaleX(1); transform-origin: left; }
      50.1% { transform: scaleX(1); transform-origin: right; }
      100% { transform: scaleX(0); transform-origin: right; }
    }
    
    /* Result views */
    #results {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .verdict-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }
    .verdict {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .verdict.fake {
      color: #ef4444;
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }
    .verdict.real {
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
    }
    .confidence {
      font-family: monospace;
      color: #aaa;
      font-size: 13px;
    }
    .heatmap-box {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .heatmap-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>DEEP<span>SHIELD</span></h1>
  </div>
  
  <div class="container">
    <button id="snap-btn">Snap & Analyze</button>
    
    <div id="status-text" class="status">System idle. Ready to deploy.</div>
    <div id="loader" class="loader"></div>
    
    <div id="results">
      <div class="verdict-box">
        <div id="verdict" class="verdict"></div>
        <div class="confidence">Score: <span id="confidence"></span>%</div>
      </div>
      <div class="heatmap-box">
        <img id="heatmap-img" src="" alt="Grad-CAM Heatmap">
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
